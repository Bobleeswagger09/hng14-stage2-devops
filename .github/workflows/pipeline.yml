name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python with flake8
        run: flake8 api/main.py worker/worker.py --max-line-length=120

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install eslint
        run: |
          cd frontend
          npm install
          npm install eslint --save-dev

      - name: Lint JavaScript with eslint
        run: |
          cd frontend
          npx eslint app.js --rule '{"no-unused-vars": "warn"}' || true

      - name: Lint API Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/htmlcov/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t scan/api:latest ./api
          docker build -t scan/worker:latest ./worker
          docker build -t scan/frontend:latest ./frontend

      - name: Install Trivy via apt
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan API image with Trivy
        run: |
          trivy image \
            --format sarif \
            --output trivy-api.sarif \
            --severity CRITICAL \
            --skip-version-check \
            --exit-code 0 \
            scan/api:latest || true

      - name: Scan worker image with Trivy
        run: |
          trivy image \
            --format sarif \
            --output trivy-worker.sarif \
            --severity CRITICAL \
            --skip-version-check \
            --exit-code 0 \
            scan/worker:latest || true

      - name: Scan frontend image with Trivy
        run: |
          trivy image \
            --format sarif \
            --output trivy-frontend.sarif \
            --severity CRITICAL \
            --skip-version-check \
            --exit-code 0 \
            scan/frontend:latest || true

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: "*.sarif"

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: echo "REDIS_PASSWORD=testpassword123" > .env

      - name: Start stack
        run: docker compose up --build -d

      - name: Wait for services
        run: sleep 30

      - name: Run integration tests
        run: bash tests/integration_test.sh

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/hng14-stage2-devops
            git pull origin main

            docker compose up -d --no-deps --build api

            MAX_WAIT=60
            WAITED=0
            until [ "$(docker inspect --format='{{.State.Health.Status}}' hng14-stage2-devops-api-1)" = "healthy" ]; do
              if [ $WAITED -ge $MAX_WAIT ]; then
                echo "Health check failed - aborting"
                docker compose up -d --no-deps api
                exit 1
              fi
              sleep 5
              WAITED=$((WAITED + 5))
            done

            docker compose up -d --no-deps --build worker frontend
            echo "Deploy successful!"
